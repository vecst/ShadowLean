name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install elan
        run: |
          curl https://elan.lean-lang.org/elan-init.sh -sSf | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Get Mathlib cache
        run: lake exe cache get

      - name: Build
        run: lake build

      - name: Axiom audit
        run: |
          lake env lean audit/AxiomAudit.lean | tee audit.out
          # Fail if any declaration depends on more than the three standard axioms
          ! grep -E "sorryAx|ofReduceBool|ofReduceNat|trustCompiler" audit.out
